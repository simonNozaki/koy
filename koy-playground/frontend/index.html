<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Koy Playground</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: monospace;
        background: #1e1e1e;
        color: #d4d4d4;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        padding: 12px 20px;
        background: #2d2d2d;
        border-bottom: 1px solid #3e3e3e;
        display: flex;
        align-items: center;
        gap: 16px;
      }

      header h1 {
        font-size: 16px;
        color: #9cdcfe;
      }

      #run-btn {
        padding: 6px 16px;
        background: #0e639c;
        color: #fff;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        font-size: 13px;
        font-family: monospace;
      }

      #run-btn:hover { background: #1177bb; }
      #run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      #editor-pane {
        flex: 1;
        overflow: auto;
        border-right: 1px solid #3e3e3e;
      }

      #output-pane {
        flex: 1;
        padding: 16px;
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      #output-pane h2 {
        font-size: 12px;
        color: #808080;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      #output {
        flex: 1;
        white-space: pre-wrap;
        font-size: 13px;
        line-height: 1.6;
      }

      #output.error { color: #f48771; }

      .cm-editor { height: 100%; font-size: 14px; }
    </style>
  </head>
  <body>
    <header>
      <h1>Koy Playground</h1>
      <button id="run-btn">▶ Run</button>
    </header>
    <main>
      <div id="editor-pane"></div>
      <div id="output-pane">
        <h2>Output</h2>
        <pre id="output"></pre>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
